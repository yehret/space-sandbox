version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: space_sandbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./space-sandbox-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/space_sandbox"
    volumes:
      - ./space-sandbox-backend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - db

  frontend:
    build: ./space-sandbox-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: