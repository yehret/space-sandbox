version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: space_sandbox
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: ./space-sandbox-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/space_sandbox"
      PORT: 3000
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge